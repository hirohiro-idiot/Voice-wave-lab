<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wave Voice Lab v4.5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Wave Voice Lab v4.5</h1>
      <p class="subtitle">音声専用・高拡大・選択範囲保存・編集画面ナビ/編集切替</p>
    </header>

    <main class="main">
      <section class="panel status-panel">
        <div id="status">準備完了</div>
        <div id="timeInfo">録音時間: 0.0 秒</div>
      </section>

      <section class="panel input-panel">
        <h2>入力</h2>

        <div class="row">
          <button id="recordBtn">録音開始</button>

          <label class="file-picker-button">
            <span>音声ファイルを選択</span>
            <input
              id="audioInput"
              type="file"
              accept=".wav,.mp3,.m4a,.aac,.ogg,.oga,.flac,.aif,.aiff,audio/*"
              onchange="window.handleAudioFileInline(event)"
            />
          </label>
        </div>

        <div class="row">
          <div id="fileInfo">ファイル未選択</div>
        </div>
      </section>

      <section class="panel library-panel">
        <h2>素材ライブラリ</h2>

        <div class="row">
          <input id="saveNameInput" class="name-input" type="text" placeholder="保存名を入力" />
          <button id="saveCurrentBtn" disabled>保存</button>
          <button id="saveEditedAsBtn" disabled>編集版を別保存</button>
          <button id="refreshLibraryBtn">一覧更新</button>
        </div>

        <div id="libraryList" class="library-list"></div>
      </section>

      <section class="panel player-panel">
        <h2>再生</h2>

        <div class="row controls-row">
          <button id="rewindBtn" disabled>-10秒</button>
          <button id="playBtn" disabled>再生</button>
          <button id="pauseBtn" disabled>一時停止</button>
          <button id="forwardBtn" disabled>+10秒</button>
          <button id="stopBtn" disabled>停止</button>
        </div>

        <div class="row controls-row">
          <button id="loopToggleBtn" disabled>ループ: OFF</button>
          <label class="inline-label" for="speedSlider">速度</label>
          <input id="speedSlider" type="range" min="0.25" max="1.5" step="0.05" value="1.0" disabled />
          <span id="speedLabel">1.00x</span>
        </div>

        <div class="seek-wrap">
          <span id="currentTimeLabel">0.00s</span>
          <input id="seekBar" type="range" min="0" max="1" step="0.001" value="0" disabled />
          <span id="durationLabel">0.00s</span>
        </div>

        <div class="row small-row">
          <span id="playbackModeInfo">再生対象: なし</span>
          <span id="playbackTimeInfo">再生位置: -</span>
        </div>
      </section>

      <section class="panel waveform-panel">
        <h2>全体波形</h2>

        <div class="canvas-wrap main-canvas-wrap">
          <canvas id="mainWaveCanvas"></canvas>
        </div>

        <div class="wave-info">
          <span id="viewInfo">表示範囲: 全体</span>
          <span id="selectionInfo">選択範囲: なし</span>
        </div>

        <div class="row controls-row">
          <button id="scrollLeftBtn" disabled>← 左へ</button>
          <button id="scrollRightBtn" disabled>右へ →</button>
          <button id="zoomInBtn" disabled>拡大</button>
          <button id="zoomOutBtn" disabled>縮小</button>
          <button id="fullViewBtn" disabled>全体表示</button>
        </div>

        <div class="row controls-row">
          <button id="playSelectionBtn" disabled>選択範囲再生</button>
          <button id="zoomToSelectionBtn" disabled>選択範囲へズーム</button>
          <button id="saveSelectionWavBtn" disabled>選択範囲を書き出し</button>
          <button id="resetSelectionBtn" disabled>選択解除</button>
          <button id="openEditorBtn" disabled>選択範囲を編集</button>
        </div>

        <p class="hint">
          青い縦バーが編集始点と終点です。バーをドラッグして範囲を調整できます。<br>
          1本指ドラッグで横スクロール、2本指ピンチで拡大縮小できます。
        </p>
      </section>

      <section class="panel editor-panel hidden" id="editorPanel">
        <h2>編集モード</h2>

        <div class="row small-row">
          <span id="editorRangeInfo">編集範囲: -</span>
          <span id="editorHint">この範囲だけ編集できます</span>
        </div>

        <div class="canvas-wrap editor-canvas-wrap">
          <canvas id="editWaveCanvas"></canvas>
        </div>

        <div class="row controls-row">
          <button id="editPlayBtn">範囲再生</button>
          <button id="editPauseBtn">一時停止</button>
          <button id="editStopBtn">停止</button>
          <button id="editLoopToggleBtn">ループ: OFF</button>
        </div>

        <div class="row controls-row">
          <button id="editModeToggleBtn">表示操作モード</button>
          <button id="editZoomInBtn">編集拡大</button>
          <button id="editZoomOutBtn">編集縮小</button>
          <button id="editFullViewBtn">範囲全体表示</button>
        </div>

        <div class="editor-row">
          <label for="toolSelect">編集ツール</label>
          <select id="toolSelect">
            <option value="draw">Draw（上下変形）</option>
            <option value="smooth">Smooth（なめらか化）</option>
            <option value="gain">Gain（局所音量アップ）</option>
            <option value="erase">Erase（局所音量ダウン）</option>
          </select>
        </div>

        <div class="editor-row">
          <label for="brushSize">ブラシ幅</label>
          <input type="range" id="brushSize" min="5" max="300" value="60" />
          <span id="brushSizeValue">60</span>
        </div>

        <div class="editor-row">
          <label for="strength">強さ</label>
          <input type="range" id="strength" min="1" max="100" value="30" />
          <span id="strengthValue">30</span>
        </div>

        <div class="row controls-row">
          <button id="undoBtn" disabled>元に戻す</button>
          <button id="cancelEditBtn">キャンセル</button>
          <button id="applyEditBtn">編集確定</button>
          <button id="saveWavBtn" disabled>WAV保存</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
