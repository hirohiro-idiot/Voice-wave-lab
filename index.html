<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wave Voice Lab v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Wave Voice Lab v2</h1>
      <p class="subtitle">録音 / 音声読込 / 動画読込 / 保存 / 波形編集 / 再生</p>
    </header>

    <main class="main">
      <section class="panel status-panel">
        <div id="status">準備完了</div>
        <div id="timeInfo">録音時間: 0.0 秒</div>
      </section>

      <section class="panel input-panel">
        <h2>入力</h2>

        <div class="row">
          <button id="recordBtn">録音開始</button>
        </div>

        <div class="row">
          <label class="file-label">
            音声ファイルを選択
            <input
              id="audioInput"
              type="file"
              accept=".wav,.mp3,.m4a,.aac,.ogg,.oga,.flac,.aif,.aiff,audio/*"
            />
          </label>

          <label class="file-label">
            動画ファイルを選択
            <input
              id="videoInput"
              type="file"
              accept=".mp4,.mov,.m4v,.webm,.ogv,video/*"
            />
          </label>
        </div>

        <div class="row">
          <label class="file-label alt">
            なんでも選択
            <input id="anyFileInput" type="file" />
          </label>
        </div>

        <div class="row">
          <div id="fileInfo">ファイル未選択</div>
        </div>
      </section>

      <section class="panel library-panel">
        <h2>素材ライブラリ</h2>

        <div class="row">
          <input id="saveNameInput" type="text" placeholder="保存名を入力" class="name-input" />
          <button id="saveCurrentBtn" disabled>保存</button>
          <button id="saveEditedAsBtn" disabled>編集版を別保存</button>
          <button id="refreshLibraryBtn">一覧更新</button>
        </div>

        <div id="libraryList" class="library-list"></div>
      </section>

      <section class="panel waveform-panel">
        <div class="playback-bar">
          <span id="playbackModeInfo">再生対象: なし</span>
          <span id="playbackTimeInfo">再生位置: -</span>
        </div>

        <div class="canvas-wrap">
          <canvas id="waveCanvas"></canvas>
        </div>

        <div class="wave-info">
          <span id="viewInfo">表示範囲: 全体</span>
          <span id="selectionInfo">選択範囲: なし</span>
        </div>
      </section>

      <section class="panel controls">
        <h2>再生</h2>
        <div class="row">
          <button id="playOriginalBtn" disabled>元音声再生</button>
          <button id="playEditedBtn" disabled>編集後再生</button>
          <button id="playSelectionBtn" disabled>選択再生</button>
          <button id="stopBtn" disabled>停止</button>
        </div>
      </section>

      <section class="panel navigation-panel">
        <h2>表示操作</h2>

        <div class="row">
          <button id="scrollLeftBtn" disabled>← 左へ</button>
          <button id="scrollRightBtn" disabled>右へ →</button>
        </div>

        <div class="row">
          <button id="zoomInBtn" disabled>拡大</button>
          <button id="zoomOutBtn" disabled>縮小</button>
          <button id="zoomToSelectionBtn" disabled>選択範囲へズーム</button>
          <button id="fullViewBtn" disabled>全体表示</button>
        </div>
      </section>

      <section class="panel editor-panel">
        <h2>編集</h2>

        <div class="editor-row">
          <label for="toolSelect">編集ツール</label>
          <select id="toolSelect">
            <option value="draw">Draw（上下変形）</option>
            <option value="smooth">Smooth（なめらか化）</option>
            <option value="gain">Gain（局所音量アップ）</option>
            <option value="erase">Erase（局所音量ダウン）</option>
            <option value="select">Select（範囲選択）</option>
          </select>
        </div>

        <div class="editor-row">
          <label for="brushSize">ブラシ幅</label>
          <input type="range" id="brushSize" min="10" max="400" value="80" />
          <span id="brushSizeValue">80</span>
        </div>

        <div class="editor-row">
          <label for="strength">強さ</label>
          <input type="range" id="strength" min="1" max="100" value="30" />
          <span id="strengthValue">30</span>
        </div>

        <div class="row">
          <button id="undoBtn" disabled>元に戻す</button>
          <button id="resetBtn" disabled>編集リセット</button>
          <button id="saveWavBtn" disabled>WAV保存</button>
        </div>
      </section>

      <section class="panel help-panel">
        <h2>使い方</h2>
        <p>
          まず録音またはファイル読込を行います。<br>
          波形上で Select を使うと範囲選択できます。<br>
          横スクロールは左右ボタン、拡大縮小は別ボタンで行います。<br>
          保存するとブラウザ内ライブラリに登録されます。<br>
          編集版は別素材として保存できます。
        </p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
