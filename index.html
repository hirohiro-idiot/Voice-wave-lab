<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wave Voice Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Wave Voice Lab</h1>
      <p class="subtitle">マイク録音 / 音声読込 / 動画読込 → 波形編集 → 再生</p>
    </header>

    <main class="main">
      <section class="panel status-panel">
        <div id="status">準備完了</div>
        <div id="timeInfo">録音時間: 0.0 秒</div>
      </section>

      <section class="panel input-panel">
        <h2>入力</h2>

        <div class="row">
          <button id="recordBtn">録音開始</button>
        </div>

        <div class="row">
          <label class="file-label">
            音声ファイルを選択
            <input
              id="audioInput"
              type="file"
              accept=".wav,.mp3,.m4a,.aac,.ogg,.oga,.flac,.aif,.aiff,audio/*"
            />
          </label>

          <label class="file-label">
            動画ファイルを選択
            <input
              id="videoInput"
              type="file"
              accept=".mp4,.mov,.m4v,.webm,.ogv,video/*"
            />
          </label>
        </div>

        <div class="row">
          <label class="file-label alt">
            なんでも選択
            <input id="anyFileInput" type="file" />
          </label>
        </div>

        <div class="row">
          <div id="fileInfo">ファイル未選択</div>
        </div>
      </section>

      <section class="panel waveform-panel">
        <div class="canvas-wrap">
          <canvas id="waveCanvas"></canvas>
        </div>

        <div class="wave-info">
          <span id="viewInfo">表示範囲: 全体</span>
          <span id="selectionInfo">選択範囲: なし</span>
        </div>
      </section>

      <section class="panel controls">
        <div class="row">
          <button id="playOriginalBtn" disabled>元音声再生</button>
          <button id="playEditedBtn" disabled>編集後再生</button>
          <button id="stopBtn" disabled>停止</button>
        </div>

        <div class="row">
          <button id="undoBtn" disabled>元に戻す</button>
          <button id="resetBtn" disabled>編集リセット</button>
          <button id="saveBtn" disabled>WAV保存</button>
        </div>

        <div class="row">
          <button id="zoomInBtn" disabled>拡大</button>
          <button id="zoomOutBtn" disabled>縮小</button>
          <button id="fullViewBtn" disabled>全体表示</button>
          <button id="playSelectionBtn" disabled>選択再生</button>
        </div>
      </section>

      <section class="panel editor-panel">
        <h2>編集</h2>

        <div class="editor-row">
          <label for="toolSelect">編集ツール</label>
          <select id="toolSelect">
            <option value="draw">Draw（上下変形）</option>
            <option value="smooth">Smooth（なめらか化）</option>
            <option value="gain">Gain（局所音量アップ）</option>
            <option value="erase">Erase（局所音量ダウン）</option>
            <option value="select">Select（範囲選択）</option>
          </select>
        </div>

        <div class="editor-row">
          <label for="brushSize">ブラシ幅</label>
          <input type="range" id="brushSize" min="10" max="400" value="80" />
          <span id="brushSizeValue">80</span>
        </div>

        <div class="editor-row">
          <label for="strength">強さ</label>
          <input type="range" id="strength" min="1" max="100" value="30" />
          <span id="strengthValue">30</span>
        </div>
      </section>

      <section class="panel help-panel">
        <h2>使い方</h2>
        <p>
          音声ファイル、動画ファイル、または録音から音を読み込めます。<br>
          iPadで選べない場合は「なんでも選択」を使ってください。<br>
          Draw: 波形を上下に変形します。<br>
          Smooth: 局所的になめらかにします。<br>
          Gain: 局所的に振幅を増やします。<br>
          Erase: 局所的に振幅を減らします。<br>
          Select: 範囲選択してその部分だけ再生できます。
        </p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
